name: E2E tests
on: push
jobs:
  chrome:
    runs-on: ubuntu-22.04
    name: E2E on Chrome
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: "npm"
      - run: npm ci
      - uses: cypress-io/github-action@v7
        with:
          browser: chrome
          command: npm run cy:run
